<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANGEL XD - CYBER CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root{
    --bg:#06070f;
    --neon:#00d4ff;
    --neon-soft:rgba(0,212,255,.4);
    --glass:rgba(15,20,35,.6);
    --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:linear-gradient(135deg,#070912,#0c0f1f);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:repeating-linear-gradient(
        45deg,
        rgba(0,212,255,.05) 0px,
        rgba(0,212,255,.05) 2px,
        transparent 2px,
        transparent 50px
    );
    animation:moveBg 20s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0)}
    to{transform:translate(-200px,-200px)}
}

.card{
    position:relative;
    width:95%;
    max-width:420px;
    background:var(--glass);
    backdrop-filter:blur(20px);
    padding:40px 30px;
    border-radius:25px;
    border:1px solid rgba(255,255,255,.1);
    box-shadow:0 0 40px rgba(0,0,0,.7);
    text-align:center;
    z-index:10;
}

.card::before{
    content:"";
    position:absolute;
    inset:-2px;
    border-radius:25px;
    padding:2px;
    background:linear-gradient(45deg,var(--neon),transparent,var(--neon));
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
            mask-composite:exclude;
    animation:borderGlow 4s linear infinite;
}

@keyframes borderGlow{
    0%{filter:hue-rotate(0deg)}
    100%{filter:hue-rotate(360deg)}
}

.logo{
    font-size:3rem;
    color:var(--neon);
    margin-bottom:15px;
    text-shadow:0 0 15px var(--neon);
}

h1{
    font-family:'Orbitron',sans-serif;
    letter-spacing:4px;
    margin-bottom:10px;
}

.status{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:.8rem;
    margin-bottom:25px;
}

.status-dot{
    width:10px;
    height:10px;
    background:#00ff6a;
    border-radius:50%;
    box-shadow:0 0 10px #00ff6a;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.4}
}

.features{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    margin-bottom:30px;
}

.features i{
    font-size:1.1rem;
    color:var(--neon);
    margin-bottom:5px;
}

.features div{
    font-size:.7rem;
}

.btn{
    width:100%;
    padding:15px;
    margin-bottom:12px;
    border:none;
    border-radius:12px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    display:block;
    transition:.3s;
}

.btn-main{
    background:var(--neon);
    color:#000;
    box-shadow:0 0 20px var(--neon-soft);
}

.btn-main:hover{
    transform:scale(1.05);
}

.btn-alt{
    background:transparent;
    border:1px solid rgba(255,255,255,.2);
    color:#fff;
}

.btn-alt:hover{
    background:rgba(255,255,255,.05);
}

.footer{
    margin-top:20px;
    font-size:.6rem;
    opacity:.6;
}
</style>
</head>
<body>

<div class="card">

<div class="logo">
<i class="fa-solid fa-angel"></i>
</div>

<h1>ANGEL XD</h1>

<div class="status">
<div class="status-dot"></div>
System Online
</div>

<div class="features">
<div><i class="fa-solid fa-bolt"></i><br>Fast</div>
<div><i class="fa-solid fa-shield"></i><br>Secure</div>
<div><i class="fa-solid fa-robot"></i><br>Auto</div>
<div><i class="fa-solid fa-eye"></i><br>Status</div>
<div><i class="fa-solid fa-link-slash"></i><br>AntiLink</div>
<div><i class="fa-solid fa-phone-slash"></i><br>AntiCall</div>
</div>

<a href="/pair" class="btn btn-main">Deploy Bot</a>
<a href="#" class="btn btn-alt">WhatsApp Channel</a>
<a href="#" class="btn btn-alt">Contact Developer</a>

<div class="footer">
CYBER ENGINE v3 • ANGEL TECH
</div>

</div>

</body>
</html>
